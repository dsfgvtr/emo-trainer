<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажёр ЭМО — Таблица ответов</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="answers-page">
    <div class="trainer-wrapper">
        <!-- Верхняя панель с изображениями -->
        <header class="images-panel">
            <div class="thumbnail-item">
                <img src="images/greens.png" alt="Зелень" class="thumbnail-image">
            </div>
            <div class="thumbnail-item">
                <img src="images/auchan.png" alt="Ашан" class="thumbnail-image">
            </div>
            <div class="thumbnail-item">
                <img src="images/building.png" alt="Здание" class="thumbnail-image">
            </div>
            <div class="thumbnail-item">
                <img src="images/roller.png" alt="Дорожный каток" class="thumbnail-image">
            </div>
            <div class="thumbnail-item">
                <img src="images/ice-rink.png" alt="Ледовый каток" class="thumbnail-image">
            </div>
        </header>

        <!-- Таблица результатов -->
        <main class="answers-container">
            <h1 class="answers-title">Таблица ответов</h1>
            
            <div class="table-wrapper">
                <table class="answers-table">
                    <thead>
                        <tr>
                            <th class="table-header" scope="col">#</th>
                            <th class="table-header" scope="col">Картинка</th>
                            <th class="table-header" scope="col">Правильный ответ</th>
                            <th class="table-header" scope="col">Твой ответ</th>
                            <th class="table-header" scope="col">Результат</th>
                        </tr>
                    </thead>
                    <tbody id="answersTableBody">
                        <!-- Строки генерируются JavaScript -->
                    </tbody>
                </table>
            </div>
        </main>

        <!-- Навигация -->
        <footer class="navigation-footer">
            <a href="index.html" class="back-link">← Вернуться к вопросам</a>
            <button class="restart-button" id="restartButton" aria-label="Перезапустить тренажёр">
                <svg class="restart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6M1 20v-6h6"/>
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                </svg>
                Перезапустить
            </button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
